<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShopManage</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- ================= NAVBAR ================= -->
<nav class="bg-white shadow-md fixed top-0 w-full">
  <div class="max-w-6xl mx-auto flex justify-between items-center p-4">

    <!-- Logo -->
    <h1 class="text-2xl font-bold text-blue-600">
        <img src="Assets/icon/shopmanageicon.png" class="w-20 h-10 mr-2 inline">
      ShopManage
    </h1>

    <!-- Add Product Button -->
    <button
      id="addProductBtn"
      class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      + Add Product
    </button>

  </div>
</nav>

<!-- ================= MAIN CONTENT ================= -->
<main class="pt-24 max-w-6xl mx-auto p-4">

  <!-- Product Grid -->
  <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    
    <div class="bg-white p-4 rounded-lg shadow">

       
      <img
        
        alt="Product Image"
        class="class_image w-full h-40 object-cover rounded">

      <h2 class="text-lg font-semibold mt-3">
        Wireless Mouse
      </h2>

      <p class="text-gray-600">
        Price: $25
      </p>

      <p class="text-sm text-gray-500">
        Category: Electronics
      </p>

      <div class="flex justify-between mt-4">
        <button id="editbtn" class="bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">
          Edit
        </button>

        <button onclick="deleteProduct(1)" id="deleteBtn" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
          Delete
        </button>
      </div>

    </div>

  </div>
</main>

<!-- ================= MODAL ================= -->
<div
  id="modal"
  class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

  <div class="bg-white p-6 rounded-lg w-96">

    <h2 class="text-xl font-bold mb-4">
      Add Product
    </h2>

    <form id="productForm">

        <input
            type="text"
            id="productName"
            placeholder="Product Name"
            class="w-full border p-2 rounded mb-3">

      <input
        type="number"
         id="productPrice"
        placeholder="Price"
        class="w-full border p-2 rounded mb-3">

      <select class="w-full border p-2 rounded mb-3">
        <option>Select Category</option>
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Home</option>
      </select>

      <input type="file" class="w-full mb-4">
      <div class="flex justify-end gap-3">
        <button
          type="button"
          id="cancelBtn"
          class="bg-gray-300 px-4 py-2 rounded">
          Cancel
        </button>

        <button 
          type="submit"
          class="bg-blue-600 text-white px-4 py-2 rounded">
          Save
        </button>
      </div>

    </form>
  </div>
</div>

<script src="Assets/js/app.js"></script>
<script src="Assets/js/api.js"></script>

</body>
</html>
